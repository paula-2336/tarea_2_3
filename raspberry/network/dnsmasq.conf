# Interfaz en la que dnsmasq va a escuchar (la antena Wi-Fi de la Raspberry)
interface=wlan0

# Rango de direcciones IP que se van a asignar a los dispositivos que se conecten
# Formato: IP_inicial, IP_final, Máscara_de_red, Tiempo_de_concesión (lease time)
dhcp-range=192.168.10.100,192.168.10.150,12h

# Configurar explícitamente la dirección IP del router (la Raspberry Pi)
dhcp-option=6,8.8.8.8


log-dhcp
log-facility=/var/log/dnsmasq.log
