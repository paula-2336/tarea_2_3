# Interfaz de red inalámbrica de la Raspberry Pi
interface=wlan0
driver=nl80211

# Nombre de la red (Debe coincidir EXACTAMENTE con tu config.json)
ssid=IoT_GrupoXX

# Modo de operación (g = banda de 2.4 GHz, que es la compatible con ESP32)
hw_mode=g
# Canal Wi-Fi (puedes usar del 1 al 11)
channel=6

# Configuraciones de visibilidad y acceso
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0

# Configuración de seguridad (WPA2)
wpa=2
# Contraseña de la red (Debe coincidir EXACTAMENTE con tu config.json)
wpa_passphrase=clave_del_grupo
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
